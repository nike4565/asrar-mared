name: Build & Release Warrior Lion

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # عشان يرفع assets في الـ release
      packages: write    # لو هتنشر npm في المستقبل

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests – skipping"

      - name: Build project
        run: npm run build --if-present

      - name: Create release zip
        run: |
          mkdir -p release
          cp -r dist/* release/ 2>/dev/null || echo "No dist folder"
          cp package.json README.md LICENSE release/ 2>/dev/null || echo "Copying available files"
          zip -r warrior-lion-${{ github.event.release.tag_name }}.zip release/

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: warrior-lion-${{ github.event.release.tag_name }}.zip
          asset_name: warrior-lion-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
