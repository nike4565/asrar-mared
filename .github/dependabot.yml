## 🚀 التثبيت

### المتطلبات الأساسية

- Node.js (v18 أو أحدث)
- Python (v3.9 أو أحدث)
- Docker (اختياري)
- Git

### خطوات التثبيت

```bash
# 1. استنساخ المستودع
git clone https://github.com/nike4949/asrar-mared.git
cd asrar-mared

# 2. تثبيت المتطلبات
npm install
pip install -r requirements.txt

# 3. نسخ ملف الإعدادات
cp .env.example .env

# 4. تعديل الإعدادات
nano .env

# 5. تشغيل المشروع
npm start
```

### التثبيت باستخدام Docker

```bash
# بناء الصورة
docker build -t asrar-mared:v6.0.0 .

# تشغيل الحاوية
docker run -d -p 3000:3000 \
  --name asrar-mared \
  -v $(pwd)/data:/app/data \
  asrar-mared:v6.0.0
```

