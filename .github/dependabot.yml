## 💻 الاستخدام

### الاستخدام الأساسي

```javascript
const AsrarMared = require('asrar-mared');

// إنشاء مثيل جديد
const security = new AsrarMared({
  encryption: 'AES-256',
  monitoring: true,
  autoUpdate: true
});

// بدء المراقبة
security.startMonitoring();

// تشفير البيانات
const encrypted = security.encrypt('بيانات سرية');

// فك التشفير
const decrypted = security.decrypt(encrypted);
```

### الاستخدام المتقدم

```python
from asrar_mared import SecuritySystem

# إنشاء نظام أمان متقدم
security = SecuritySystem(
    mode='advanced',
    ai_detection=True,
    real_time_alerts=True
)

# تفعيل الحماية الشاملة
security.enable_full_protection()

# مراقبة التهديدات
threats = security.detect_threats()

# الاستجابة التلقائية
security.auto_respond(threats)
```

