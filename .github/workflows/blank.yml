name: CI

on:
  push:
    branches: [ "Warrior" ]
  pull_request:
    branches: [ "Warrior" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Run CI checks
        run: make ci
