steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Go
    uses: actions/setup-go@v5
    with:
      go-version: '1.20'

  - name: Cache Go modules
    uses: actions/cache@v4
    with:
      path: |
        ~/.cache/go-build
        ~/go/pkg/mod
      key: \( {{ runner.os }}-go- \){{ hashFiles('**/go.sum') }}
      restore-keys: ${{ runner.os }}-go-

  - name: Install Go dependencies
    run: go mod tidy

  - name: Set up Ruby
    uses: ruby/setup-ruby@v1
    with:
      ruby-version: '3.0'
      bundler-cache: true  # تلقائي يعمل cache للـ gems

  - name: Install Ruby dependencies
    run: |
      cd ruby/
      bundle install

  - name: Format Go code
    run: make fmt

  - name: Lint Go code
    uses: golangci/golangci-lint-action@v4
    with:
      version: latest
      args: --timeout=3m

  - name: Build project
    run: make build

  - name: Run tests
    run: make test

  - name: Coverage report
    run: make coverage  # لو في make target للـ coverage، أو غيّرها لـ go test -cover
